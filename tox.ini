[tox]
envlist =
    py310-django42,
    py310-django50,
    py310-django51,
    py311-django42,
    py311-django50,
    py311-django51,
    py312-django42,
    py312-django50,
    py312-django51
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest
    pytest-django
    django42: Django>=4.2,<5.0
    django50: Django>=5.0,<5.1
    django51: Django>=5.1,<5.2
commands =
    pytest tests/ -v {posargs}
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}

[testenv:lint]
deps = ruff
commands = ruff check xeolux_cachekit/

[testenv:format]
deps = ruff
commands = ruff format --check xeolux_cachekit/
